// ============================================================================
// Fork-owned social identity + moderation messages (docs/Social.md,
// docs/SocialModeration.md; ADR-0005/0006/0007). NEW top-level messages, so
// field numbering starts at 1 (the >= 1001 rule applies only to fields added
// inside shared upstream messages). Schema-only for now: declared ahead of the
// backend + client wiring, which ships dark behind FeatureFlag.socialProfiles.
// Identity is keyed to the immutable account uuid; the handle is permanent.
// ============================================================================

// Per-field profile visibility. Stored three-tier from day one; the Phase-1 UI
// only writes PRIVATE/PUBLIC, and FOLLOWERS_ONLY unlocks with the Phase-2 graph.
// UNSPECIFIED (0, the proto3 default) is treated as PRIVATE by every reader.
enum SocialVisibility {
  SOCIAL_VISIBILITY_UNSPECIFIED = 0;
  SOCIAL_VISIBILITY_PRIVATE = 1;
  SOCIAL_VISIBILITY_PUBLIC = 2;
  SOCIAL_VISIBILITY_FOLLOWERS_ONLY = 3;
}

// Result of a handle availability check / claim attempt. TOMBSTONED and RESERVED
// are permanently unavailable (deleted accounts and the reserved-word blocklist).
enum HandleStatus {
  HANDLE_STATUS_UNSPECIFIED = 0;
  HANDLE_STATUS_AVAILABLE = 1;
  HANDLE_STATUS_TAKEN = 2;
  HANDLE_STATUS_RESERVED = 3;
  HANDLE_STATUS_TOMBSTONED = 4;
  HANDLE_STATUS_INVALID = 5;
}

// Why a user or content item is being reported into the triage queue.
enum ReportReason {
  REPORT_REASON_UNSPECIFIED = 0;
  REPORT_REASON_SPAM = 1;
  REPORT_REASON_HARASSMENT = 2;
  REPORT_REASON_HATE = 3;
  REPORT_REASON_SEXUAL = 4;
  REPORT_REASON_IMPERSONATION = 5;
  REPORT_REASON_OTHER = 6;
}

// Result of the mandatory CSAM/nudity scan on an uploaded avatar. This is the
// response only — the upload request body is raw image bytes (octet-stream),
// not a protobuf message.
enum AvatarUploadStatus {
  AVATAR_UPLOAD_STATUS_UNSPECIFIED = 0;
  AVATAR_UPLOAD_STATUS_ACCEPTED = 1;
  AVATAR_UPLOAD_STATUS_REJECTED_SCAN = 2;
  AVATAR_UPLOAD_STATUS_REJECTED_FORMAT = 3;
}

// The full social profile of the calling account: every field plus every
// visibility tier. Keyed to the immutable account uuid; the handle is permanent
// (immutable in the user UI). display_name has no tier — it is always public
// once joined, as the addressable identity.
message SocialProfile {
  string user_id = 1;                 // immutable account uuid (ServerSettings.userId)
  string handle = 2;                  // immutable, lowercase [a-z0-9_], 3-30
  string display_name = 3;            // always public once joined
  string bio = 4;
  string avatar_url = 5;              // CDN URL of the scanned avatar; empty if none
  google.protobuf.Timestamp created_at = 6;
  int32 terms_version = 7;            // public-identity terms accepted at join
  SocialVisibility avatar_visibility = 8;
  SocialVisibility bio_visibility = 9;
  SocialVisibility followed_shows_visibility = 10;
  SocialVisibility top_podcasts_visibility = 11;
  SocialVisibility stats_visibility = 12;
  SocialVisibility history_visibility = 13;
  SocialVisibility presence_visibility = 14;
  // Hybrid follow consent (Slice 5): when true, new follows become requests.
  bool require_follow_approval = 15;
}

// POST social/handle/availability — the rate-limited typeahead availability check.
message HandleAvailabilityRequest {
  string handle = 1;
}
message HandleAvailabilityResponse {
  HandleStatus status = 1;
  string normalized_handle = 2;       // server-normalized form the client should display
}

// POST social/join — claims the handle and creates the profile. Every visibility
// field defaults PRIVATE server-side; display_name is the only public field.
message JoinRequest {
  string handle = 1;
  int32 accepted_terms_version = 2;
  string display_name = 3;            // candidate, seeded from the device-local Share Profile
}
message JoinResponse {
  SocialProfile profile = 1;
}

// POST social/profile/get (empty request) and social/profile/update. The handle
// is never accepted on update (immutable); display_name/bio re-run the text
// pre-filter server-side.
message ProfileGetRequest {}
message ProfileUpdateRequest {
  string display_name = 1;
  string bio = 2;
  SocialVisibility avatar_visibility = 3;
  SocialVisibility bio_visibility = 4;
  SocialVisibility followed_shows_visibility = 5;
  SocialVisibility top_podcasts_visibility = 6;
  SocialVisibility stats_visibility = 7;
  SocialVisibility history_visibility = 8;
  SocialVisibility presence_visibility = 9;
  bool require_follow_approval = 10;
}
message ProfileResponse {
  SocialProfile profile = 1;
}

// GET social/u/{handle} — optionally authenticated. The server applies per-field
// visibility AND the viewer's block relationship (a blocked viewer reads as
// not-found); only fields the viewer may see are populated. Powers pca.st/u/<handle>.
message PublicProfileRequest {
  string handle = 1;
}
message PublicProfileResponse {
  string user_id = 1;
  string handle = 2;
  string display_name = 3;
  string bio = 4;                     // empty if bio_visibility hides it from this viewer
  string avatar_url = 5;              // empty if avatar_visibility hides it
  google.protobuf.Timestamp created_at = 6;
  bool has_stats = 7;                 // section presence implies the viewer may see it
  // Visibility-gated sections: populated only when the matching field is
  // visible to this viewer (or the viewer is the owner). Server-capped sizes.
  // The heatmap grid is deliberately absent: no per-day series exists
  // server-side; it renders from local data on the owner's own profile only.
  repeated SocialProfilePodcast followed_shows = 8;
  repeated SocialProfilePodcast top_podcasts = 9;
  SocialProfileStats stats = 10;      // set only when has_stats
  repeated SocialProfileEpisode recently_played = 11;
  int64 follower_count = 12;
  int64 following_count = 13;
  FollowState your_follow_state = 14;
  repeated SharedList lists = 15;      // visibility-filtered for this viewer // authenticated viewers only
}

// A podcast entry in a public-profile section (followed shows / top podcasts).
message SocialProfilePodcast {
  string uuid = 1;
  string title = 2;                   // catalog-resolved; may be empty if uncataloged
  string author = 3;
  int64 played_seconds = 4;           // top-podcasts ranking signal; 0 elsewhere
}

// A recently-played entry in a public-profile section (from listening history).
message SocialProfileEpisode {
  string uuid = 1;
  string podcast_uuid = 2;
  string title = 3;
  google.protobuf.Timestamp played_at = 4;
}

// Aggregate listening totals for a public profile. Totals only — the per-day
// heatmap series never leaves the device.
message SocialProfileStats {
  int64 time_listened_seconds = 1;
  google.protobuf.Timestamp listening_since = 2;
}

// POST social/avatar response (request body is raw image bytes; see enum above).
message AvatarUploadResponse {
  AvatarUploadStatus status = 1;
  string avatar_url = 2;              // populated only on ACCEPTED
}

// Moderation + safety. block = mutual invisibility; mute = one-way hide;
// report = a flag into the triage queue. target_user_id is the immutable uuid.
message BlockRequest {
  string target_user_id = 1;
}
message MuteRequest {
  string target_user_id = 1;
}
message ReportRequest {
  string target_user_id = 1;
  ReportReason reason = 2;
  string context = 3;                 // pointer/description of the offending content
  // Content-level reports (additive): what kind of content is being reported
  // ("user" when empty, "review", ...) and its reference (e.g. the podcast
  // uuid of the author's review). The moderation queue records both.
  string target_type = 4;
  string content_ref = 5;
}

// POST social/erase — GDPR erasure: clears PII, tombstones the handle.
message EraseRequest {}

// Simple ack shared by block/unblock/mute/unmute/report/erase.
message SocialAck {
  bool success = 1;
}

// ---- Written reviews + episode reactions (Slice 3; iOS docs/Social.md).
// A Review = the existing anonymous star rating plus optional PUBLIC text;
// the text half requires a joined account and is attributed. Reactions are
// account-recorded but displayed as aggregate counts only.

// POST social/review/submit — upserts the caller's attributed review text for
// a podcast (stars ride the existing user/podcast_rating endpoints).
message PodcastReviewSubmitRequest {
  string podcast_uuid = 1;
  string text = 2;
}

message PodcastReview {
  string user_id = 1;                 // author's account uuid
  string handle = 2;
  string display_name = 3;
  uint32 rating = 4;                  // the author's star rating (0 = none)
  string text = 5;
  google.protobuf.Timestamp created_at = 6;
  google.protobuf.Timestamp updated_at = 7;
}

// POST podcast/reviews — public, paginated, newest first. your_review is set
// only for authenticated callers who have one.
message PodcastReviewsRequest {
  string podcast_uuid = 1;
  int32 limit = 2;
  int32 offset = 3;
}
message PodcastReviewsResponse {
  repeated PodcastReview reviews = 1;
  int64 total = 2;
  PodcastReview your_review = 3;
}

// POST social/review/delete — removes the caller's review text for a podcast.
message PodcastReviewDeleteRequest {
  string podcast_uuid = 1;
}

// The fixed reaction set (❤️ 😂 🤯 👏 🔥).
enum ReactionKind {
  REACTION_KIND_UNSPECIFIED = 0;      // in set requests: clear my reaction
  REACTION_KIND_HEART = 1;
  REACTION_KIND_LAUGH = 2;
  REACTION_KIND_MIND_BLOWN = 3;
  REACTION_KIND_CLAP = 4;
  REACTION_KIND_FIRE = 5;
}

// POST social/reaction/set — upserts (or clears, when UNSPECIFIED) the
// caller's single reaction on an episode.
message EpisodeReactionSetRequest {
  string episode_uuid = 1;
  ReactionKind kind = 2;
}

// POST episode/reactions — aggregate counts; your_reaction set only for
// authenticated callers.
message EpisodeReactionsRequest {
  string episode_uuid = 1;
}
message ReactionCount {
  ReactionKind kind = 1;
  int64 count = 2;
}
message EpisodeReactionsResponse {
  repeated ReactionCount counts = 1;
  ReactionKind your_reaction = 2;
}


// ---- Send-to-friend + shared-item inbox (Slice 4; iOS docs/Social.md).
// The first directed social object: an episode sent person-to-person. Sender
// AND recipient must be joined; blocked-either-way sends fail identically to a
// nonexistent handle. Inbox v1 is read/unread + delete (react deferred until a
// sender-visible surface exists).

// POST social/share/send. Titles are denormalized at send time so inbox rows
// render without catalog fetches (works for uncataloged feeds); the server
// caps and filters them.
message SharedItemSendRequest {
  string recipient_handle = 1;
  string episode_uuid = 2;
  string podcast_uuid = 3;
  string episode_title = 4;
  string podcast_title = 5;
  string note = 6;                    // optional; <=500 chars, text-filtered
  int32 timestamp_seconds = 7;        // optional listen-from position (?t= model)
}

message SharedItem {
  int64 id = 1;
  string sender_user_id = 2;
  string sender_handle = 3;
  string sender_display_name = 4;
  string episode_uuid = 5;
  string podcast_uuid = 6;
  string episode_title = 7;
  string podcast_title = 8;
  string note = 9;
  int32 timestamp_seconds = 10;
  google.protobuf.Timestamp created_at = 11;
  bool read = 12;
}

// POST social/inbox — the caller's received items, newest first.
message InboxRequest {
  int32 limit = 1;
  int32 offset = 2;
}
message InboxResponse {
  repeated SharedItem items = 1;
  int64 total = 2;
  int64 unread = 3;
}

// POST social/inbox/read — marks the given item ids read (recipient-scoped).
message InboxMarkReadRequest {
  repeated int64 ids = 1;
}

// POST social/inbox/delete — removes one received item (recipient-scoped).
message InboxDeleteRequest {
  int64 id = 1;
}

// ---- Follow graph + activity feed (Slice 5; iOS docs/Social.md, ADR-0009).
// Follows are open/instant by default; a followee with require_follow_approval
// turns new follows into PENDING requests. Blocked-either-way follows fail
// like a nonexistent handle. The feed is derived at read time from followees'
// existing rows (no events table); listening-derived items obey the actor's
// per-field visibility.

enum FollowState {
  FOLLOW_STATE_NONE = 0;
  FOLLOW_STATE_PENDING = 1;
  FOLLOW_STATE_ACTIVE = 2;
}

// POST social/follow — returns the resulting state (ACTIVE or PENDING).
message FollowRequest {
  string handle = 1;
}
message FollowResponse {
  FollowState state = 1;
}

// POST social/unfollow — also cancels a pending request. Ack via SocialAck.
message UnfollowRequest {
  string handle = 1;
}

// POST social/follows — either side of the caller's graph.
message FollowListRequest {
  int32 limit = 1;
  int32 offset = 2;
  bool followers = 3;                 // true = my followers, false = who I follow
}
message FollowEntry {
  string handle = 1;
  string display_name = 2;
  string user_id = 3;
  FollowState state = 4;
}
message FollowListResponse {
  repeated FollowEntry entries = 1;
  int64 total = 2;
}

// POST social/follow/requests — pending requests awaiting the caller's
// approval. POST social/follow/approve accepts or declines one.
message FollowRequestsRequest {
  int32 limit = 1;
  int32 offset = 2;
}
message FollowApprovalRequest {
  string requester_handle = 1;
  bool accept = 2;
}

// POST social/feed — the caller's activity feed, newest first, paginated by
// event time.
message FeedRequest {
  int32 limit = 1;
  int64 before_unix_ms = 2;           // 0 = newest page
}
enum FeedItemKind {
  FEED_ITEM_KIND_UNSPECIFIED = 0;
  FEED_ITEM_KIND_JOINED = 1;
  FEED_ITEM_KIND_FOLLOWED_PERSON = 2;
  FEED_ITEM_KIND_FOLLOWED_SHOW = 3;
  FEED_ITEM_KIND_FINISHED_EPISODE = 4;
  FEED_ITEM_KIND_REVIEWED = 5;
  FEED_ITEM_KIND_REACTED = 6;
  FEED_ITEM_KIND_COMMENTED = 7;
  FEED_ITEM_KIND_PUBLISHED_LIST = 8;
}
message FeedItem {
  FeedItemKind kind = 1;
  string actor_handle = 2;
  string actor_display_name = 3;
  string actor_user_id = 4;
  string podcast_uuid = 5;
  string podcast_title = 6;
  string episode_uuid = 7;
  string episode_title = 8;
  string target_handle = 9;           // FOLLOWED_PERSON
  ReactionKind reaction_kind = 10;    // REACTED
  string review_excerpt = 11;         // REVIEWED / COMMENTED excerpt (capped)
  google.protobuf.Timestamp event_at = 12;
  string list_title = 13;             // PUBLISHED_LIST
  int64 list_id = 14;                 // PUBLISHED_LIST
}
message FeedResponse {
  repeated FeedItem items = 1;
}

// ---- Slice 6: episode comment tree (docs/Social.md, ADR-0010) ----

message CommentSubmitRequest {
  string episode_uuid = 1;
  string podcast_uuid = 2;
  string text = 3;
  int64 parent_id = 4;                 // 0 = top-level
  optional int32 timestamp_seconds = 5; // top-level only; a set value renders as a Moment
  string episode_title = 6;            // denormalized at submit (uncataloged feeds)
  string podcast_title = 7;
}

message SocialComment {
  int64 id = 1;
  int64 parent_id = 2;                 // 0 = top-level
  string user_id = 3;                  // empty when removed (tombstone)
  string handle = 4;
  string display_name = 5;
  string text = 6;                     // empty when removed
  optional int32 timestamp_seconds = 7;
  google.protobuf.Timestamp created_at = 8;
  bool edited = 9;
  bool removed = 10;                   // tombstone placeholder
  int32 reply_count = 11;              // direct children
  string episode_uuid = 12;            // set on inbox-reply rows
  string podcast_uuid = 13;
  string episode_title = 14;
  string podcast_title = 15;
}

message CommentEditRequest {
  int64 id = 1;
  string text = 2;
}

message CommentDeleteRequest {
  int64 id = 1;
}

message EpisodeCommentsRequest {
  string episode_uuid = 1;
  int32 limit = 2;
  int32 offset = 3;
}

message CommentRepliesRequest {
  int64 parent_id = 1;
  int32 limit = 2;
  int32 offset = 3;
}

message CommentsResponse {
  repeated SocialComment comments = 1;
  int32 total = 2;
}

message InboxRepliesRequest {
  int32 limit = 1;
  int32 offset = 2;
}

message InboxRepliesResponse {
  repeated SocialComment replies = 1;
  int32 total = 2;
  int32 unread = 3;                    // newer than the caller's seen-watermark
}

// ---- Slice 7: collaborative + subscribable lists (docs/Social.md, ADR-0011) ----

enum SharedListRole {
  SHARED_LIST_ROLE_NONE = 0;
  SHARED_LIST_ROLE_OWNER = 1;
  SHARED_LIST_ROLE_COLLABORATOR = 2;
  SHARED_LIST_ROLE_SUBSCRIBER = 3;
  SHARED_LIST_ROLE_INVITED = 4;
}

message SharedListMember {
  string handle = 1;
  string display_name = 2;
  SharedListRole role = 3;
}

message SharedList {
  int64 id = 1;
  string owner_handle = 2;
  string owner_display_name = 3;
  string title = 4;
  string description = 5;
  SocialVisibility visibility = 6;
  google.protobuf.Timestamp created_at = 7;
  google.protobuf.Timestamp updated_at = 8;
  int32 entry_count = 9;
  SharedListRole your_role = 10;
  repeated SharedListMember members = 11; // collaborators + pending invites (owner view)
}

message SharedListEntry {
  string episode_uuid = 1;
  string podcast_uuid = 2;
  string episode_title = 3;
  string podcast_title = 4;
  int32 position = 5;
  string added_by_handle = 6;          // empty when the adder was erased
  google.protobuf.Timestamp added_at = 7;
}

message SharedListCreateRequest {
  string title = 1;
  string description = 2;
  SocialVisibility visibility = 3;
  repeated SharedListEntry entries = 4; // initial snapshot (materialize-to-share)
}

message SharedListUpdateRequest {
  int64 list_id = 1;
  string title = 2;
  string description = 3;
  SocialVisibility visibility = 4;
}

message SharedListDeleteRequest {
  int64 list_id = 1;
}

message SharedListEntriesRequest {
  int64 list_id = 1;
  int32 limit = 2;
  int32 offset = 3;
}

message SharedListEntriesResponse {
  SharedList list = 1;
  repeated SharedListEntry entries = 2;
  int32 total = 3;
}

enum SharedListOp {
  SHARED_LIST_OP_UNSPECIFIED = 0;
  SHARED_LIST_OP_ADD = 1;
  SHARED_LIST_OP_REMOVE = 2;
  SHARED_LIST_OP_MOVE = 3;
}

message SharedListEntryOpRequest {
  int64 list_id = 1;
  SharedListOp op = 2;
  string episode_uuid = 3;
  string podcast_uuid = 4;
  string episode_title = 5;
  string podcast_title = 6;
  int32 position = 7;                  // ADD append when < 0; MOVE target
}

message SharedListInviteRequest {
  int64 list_id = 1;
  string handle = 2;
}

message SharedListInviteRespondRequest {
  int64 list_id = 1;
  bool accept = 2;
}

message SharedListSubscribeRequest {
  int64 list_id = 1;
  bool subscribe = 2;
}

message SharedListsRequest {
}

message SharedListsResponse {
  repeated SharedList lists = 1;       // owned + collaborating + subscribed
  repeated SharedList invites = 2;     // pending invitations to the caller
}
