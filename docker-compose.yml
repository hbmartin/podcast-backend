services:
  app:
    build:
      dockerfile: Dockerfile
      context: .
      target: runner
    restart: unless-stopped
    environment:
      ENV: "local"
      WEB_PORT: ":8000"
      AUTH_JWT_SECRET: "${AUTH_JWT_SECRET}"
      DB_CONNECTION_STRING: "postgres://postgres:${POSTGRES_PASSWORD}@db:5432/podcasts?sslmode=disable"
      ALLOWED_ORIGIN: "*"
      ENABLE_TASK_QUEUE: true
      QUEUE_REDIS_ADDRESS: "cache:6379"
      QUEUE_REDIS_PASSWORD: "${REDIS_PASSWORD}"
      QUEUE_REDIS_DB: "1"
    ports:
      - "8000:8000"
    healthcheck:
      test: ["CMD", "./podcast-backend", "-health"]
      interval: 30s
      timeout: 5s
      start_period: 15s
      retries: 3
    depends_on:
      db:
        condition: service_healthy
      cache:
        condition: service_healthy
    networks:
      - backend
  db:
    image: postgres:16-alpine
    ports:
      - "5432:5432"
    volumes:
      - data:/var/lib/postgresql/data
    environment:
      POSTGRES_DB: podcasts
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: "${POSTGRES_PASSWORD}"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d podcasts"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - backend
  cache:
    image: redis:7-alpine
    restart: always
    ports:
      - '6379:6379'
    volumes:
      - cache:/var/lib/redis/data
    command:
      - /bin/sh
      - -c
      - redis-server --requirepass "$${REDIS_PASSWORD}"
    healthcheck:
      test: ["CMD-SHELL", "redis-cli -a \"$${REDIS_PASSWORD}\" ping | grep PONG"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - backend
volumes:
  data:
  cache:
networks:
  backend:
