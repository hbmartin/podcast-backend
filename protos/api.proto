// ============================================================================
// Fork extensions — AI features (transcripts, chapters, highlights).
// Schema-only for now: messages are declared ahead of server/client wiring.
// Shapes mirror the iOS types they transport (EpisodeTranscriptionRecord,
// TranscriptCue/TranscriptSearchSegment, GeneratedChapter).
// ============================================================================

// Publisher-provided transcript metadata ({url, type, language} — served via
// the show-notes JSON endpoint today).
message TranscriptMetadata {
  string url = 1;
  string type = 2; // MIME type, e.g. text/vtt
  google.protobuf.StringValue language = 3; // BCP-47
}

// Per-episode generated-transcription metadata: EpisodeTranscriptionRecord
// minus the device-operational fields (file_path, remote_job_id,
// error_message), which never leave the device.
message TranscriptionRecord {
  string episode_uuid = 1;
  string podcast_uuid = 2;
  int32 status = 3; // TranscriptionStatus: queued 0 / processing 1 / completed 2 / failed 3 / cancelled 4
  int32 engine_mode = 4; // appleBuiltIn 0 / localModel 1 / remoteProvider 2
  string provider = 5; // remote provider id, e.g. "assemblyai"
  string model_id = 6; // local model variant / engine build id
  string language = 7; // BCP-47
  double duration_secs = 8;
  int32 speaker_count = 9;
  string speaker_names_json = 10; // {"Speaker 1":"Alice"}
  google.protobuf.Timestamp created_at = 11;
  google.protobuf.Timestamp updated_at = 12;
}

// One transcript cue. end_time is absent for some generated cues; speaker only
// exists for diarized (generated) transcripts.
message TranscriptCue {
  int32 index = 1;
  string text = 2;
  double start_time = 3;
  google.protobuf.DoubleValue end_time = 4;
  google.protobuf.StringValue speaker = 5;
}

// Full transcript content for one episode.
message EpisodeTranscript {
  string episode_uuid = 1;
  string podcast_uuid = 2;
  string source = 3; // TranscriptSource: "provided" | "generated"
  string language = 4; // BCP-47
  repeated TranscriptCue cues = 5;
}

// Crowd-sourced transcript corpus: transcript BODIES post to a dedicated
// endpoint — deliberately NOT a SyncUpdateRequest Record — so anonymous users
// can contribute, mirroring the anonymous/feedback pattern. Intended
// endpoints (unimplemented): POST transcripts/upload (anonymous-capable) and
// POST transcripts/show (read complement).
message TranscriptUploadRequest {
  string episode_uuid = 1;
  string podcast_uuid = 2;
  EpisodeTranscript transcript = 3;
  TranscriptionRecord provenance = 4; // engine/model/provider metadata
}

message TranscriptUploadResponse {
  bool accepted = 1;
}

message TranscriptShowRequest {
  string episode_uuid = 1;
  string podcast_uuid = 2;
} // response: EpisodeTranscript

// AI-generated chapters for a chapterless episode (server meta.json or
// on-device generation).
message GeneratedChapter {
  string title = 1;
  string timestamp = 2; // display form, "m:ss" / "h:mm:ss"
  double start_time = 3;
}

message EpisodeGeneratedChapters {
  string episode_uuid = 1;
  string podcast_uuid = 2;
  repeated GeneratedChapter chapters = 3;
  string origin = 4; // "server" | "on_device"
}

